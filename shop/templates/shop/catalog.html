<!DOCTYPE html>
<html>
<head>
    <title>SweetHandmade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .filters {
            margin-bottom: 20px;
            padding: 10px;
            background: #eee;
        }
        .products {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .card {
            border: 1px solid #ccc;
            padding: 10px;
            width: 200px;
        }
        .price {
            color: green;
            font-weight: bold;
        }
        button {
            background: orange;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>SweetHandmade</h1>

    <div class="filters">
        <form method="get">
            <input type="text" name="search" placeholder="Поиск..." value="{{ search_query }}">
            
            <select name="sort">
                <option value="">Сортировка</option>
                <option value="price_asc" {% if sort_by == 'price_asc' %}selected{% endif %}>Сначала дешевые</option>
                <option value="price_desc" {% if sort_by == 'price_desc' %}selected{% endif %}>Сначала дорогие</option>
            </select>
            
            <select name="category">
                <option value="all">Все категории</option>
                {% for cat in categories %}
                    <option value="{{ cat.slug }}" {% if selected_category == cat.slug %}selected{% endif %}>
                        {{ cat.name }}
                    </option>
                {% endfor %}
            </select>
            
            <button type="submit">Применить</button>
        </form>
    </div>

    <div class="products">
        {% for product in products %}
        <div class="card">
            <h3>{{ product.name }}</h3>
            <p>{{ product.category.name }}</p>
            <p class="price">{{ product.price }} руб</p>
            <button>В корзину</button>
        </div>
        {% empty %}
        <p>Товаров не найдено</p>
        {% endfor %}
    </div>

</body>
</html>
