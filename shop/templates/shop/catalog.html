{% extends 'shop/base.html' %}

{% block content %}

<div class="filters">
    <form method="get">
        <input type="text" name="search" placeholder="Поиск..." value="{{ search_query }}">
        
        <select name="sort">
            <option value="">Сортировка</option>
            <option value="price_asc" {% if sort_by == 'price_asc' %}selected{% endif %}>Сначала дешевые</option>
            <option value="price_desc" {% if sort_by == 'price_desc' %}selected{% endif %}>Сначала дорогие</option>
        </select>
        
        <select name="category">
            <option value="all">Все категории</option>
            {% for cat in categories %}
                <option value="{{ cat.slug }}" {% if selected_category == cat.slug %}selected{% endif %}>
                    {{ cat.name }}
                </option>
            {% endfor %}
        </select>
        
        <button type="submit">Применить</button>
    </form>
</div>

<div class="products">
    {% for product in products %}
    <div class="card">
        {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.name }}" style="width: 100%; height: auto; max-height: 150px; object-fit: cover;">
        {% else %}
            <div style="width: 100%; height: 150px; background: #eee; display: flex; align-items: center; justify-content: center;">Нет фото</div>
        {% endif %}
        <h3>{{ product.name }}</h3>
        <p>{{ product.category.name }}</p>
        <p class="price">{{ product.price }} руб</p>
        <form method="post" action="/add-to-cart/{{ product.id }}/">
            {% csrf_token %}
            <button type="submit">В корзину</button>
        </form>
    </div>
    {% empty %}
    <p>Товаров не найдено</p>
    {% endfor %}
</div>

{% endblock %}
